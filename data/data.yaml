epa:
  preprocess:
    zip: true
    zip_path:     /home/rishi/ML Projects/AirBench/Datasets/epa_data
    unzip_dir: /home/rishi/ML Projects/AirBench/EPA/unzip_dir
    by_year_by_site_dir: /home/rishi/ML Projects/AirBench/EPA/epa_data_by_site_by_year
    by_site_all_years_dir: /home/rishi/ML Projects/AirBench/EPA/processed
    target_start: "2022-07-01 00:00:00"
    target_end:   "2025-06-30 23:00:00"

  visualise:
    make_dicts: true
    folder: /home/rishi/ML Projects/AirBench/EPA/processed
    date_range:
      start: "2022-07-01 00:00:00"
      end:   "2025-06-30 23:00:00"
    output:
      dicts_dir: /home/rishi/ML Projects/AirBench/EPA/vis_dicts
      image_dir:  visualize_epa_images
    features:
      - "PM2.5 (µg/m³)"
      - "PM10 (µg/m³)"
      - "NO2 (µg/m³)"
      - "SO2 (µg/m³)"
      - "CO (mg/m³)"
      - "Ozone (µg/m³)"
    pollutant_limits:
      "PM2.5 (µg/m³)": 15
      "PM10 (µg/m³)":  45
      "NO2 (µg/m³)":   25
      "SO2 (µg/m³)":   40
      "CO (mg/m³)":    4
      "Ozone (µg/m³)": 100
    
  imputation:
    dicts_dir: /home/rishi/ML Projects/AirBench/EPA/vis_dicts
    input_dir: /home/rishi/ML Projects/AirBench/EPA/processed
    output_dir: /home/rishi/ML Projects/AirBench/EPA/imputed
    max_gap_hours: 336
    max_data_missing: 30
    max_workers: 24
    date_range:
