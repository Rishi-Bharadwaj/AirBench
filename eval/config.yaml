# Paths relative to this file's location
time_repo: .                     # path to the TIME repo (contains experiments/)
data_dir: ../data/hf_dataset    # where converted HF Arrow datasets live (= TIME_DATASET)
datasets_config: datasets.yaml      # your dataset config (test/val/prediction lengths)

# Models and their dependencies
models:

  chronos_bolt:
    script: experiments/chronos_bolt.py
    packages:
      - chronos-forecasting
    args:
      context_length: 168
      batch_size: 1024

  chronos2:
    script: experiments/chronos2.py
    packages:
      - chronos-forecasting
    args:
      context_length: 168
      batch_size: 1024

  moirai:
    script: experiments/moirai.py
    packages:
      - uni2ts
      - huggingface-hub==0.34.0
    args:
      context_length: 168
      batch_size: 1024

  moirai2:
    script: experiments/moirai2.py
    packages:
      - uni2ts
      - huggingface-hub==0.34.0
    args:
      model_size: small   # only size currently released for moirai-2.0
      context_length: 168
      batch_size: 1024

  timesfm1:
    script: experiments/timesfm1.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      context_length: 168
      batch_size: 1024

  timesfm2:
    script: experiments/timesfm2.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      context_length: 168
      batch_size: 1024

  timesfm25:
    script: experiments/timesfm2.5.py
    packages:
      - git+https://github.com/google-research/timesfm.git
    args:
      context_length: 168
      batch_size: 1024
  

  sundial:
    script: experiments/sundial.py
    packages:
      - transformers==4.40.1
    args:
      context_length: 168
      batch_size: 1024
      
  tirex:
    script: experiments/tirex_model.py
    packages:
      - tirex-ts
    args:
      context_length: 168
      batch_size: 1024


  visionts:
    script: experiments/visiontspp.py
    packages:
      - visionts
    args:
      context_length: 168
      batch_size: 1024

  seasonal_naive:
    script: experiments/seasonal_naive.py
    packages:
      - statsforecast
    args:
      context_length: 168
      n_jobs: 16


  auto_ets:
    script: experiments/auto_ets.py
    packages:
      - statsforecast
    args:
      context_length: 168
      n_jobs: 16


  dlinear:
    script: experiments/dlinear.py
    packages:
      - autogluon.timeseries
    args:
      context_length: 168
      max_epochs: 100
      early_stopping_patience: 10



  patchtst:
    script: experiments/patchtst.py
    packages:
      - autogluon.timeseries
    args:
      context_length: 168
      max_epochs: 100
      early_stopping_patience: 10
      
  kairos:
    script: experiments/kairos_model.py
    git_clone:
      url: https://github.com/foundation-model-research/Kairos.git
      dest: experiments/Kairos
    packages:
      - python-dotenv
      - pyarrow
      - huggingface-hub==0.34.0
      - transformers>=4.43
    args:
      context_length: 168
      batch_size: 1024


    
# Default datasets to run when no dataset= override is given
datasets:
  # - CPCB/H
  - AURN/H
  # - EPA/H
  # # - CNEMC/H 
  # - SINAICA/H
  # - EEA_DE/H
  # - EEA_FR/H
  # - CNEMC_SMALL/H

# Leaderboard settings
leaderboard:
  results_dir: output/results
  datasets:             # leave empty or omit to use all datasets in results_dir
    - CPCB/H
    - SINAICA/H
    - EEA_DE/H
    - EEA_FR/H
    - AURN/H
    - EPA/H
    - CNEMC_SMALL/H
  metric: MASE          # sort by this metric
  air_pollution: true   # per-pollutant leaderboard instead of original overall leaderboard